version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bookstore-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Vlucht2040#"
      POSTGRES_DB: gobooksnew
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gobooksnew"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: deployment/Dockerfile.migrate
    volumes:
      - ./db/migrations:/migrations
    command: ["postgres", "postgres://postgres:Vlucht2040%23@db:5432/gobooksnew?sslmode=disable", "up"]
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstore-api
    environment:
      DATABASE_URL: "postgres://postgres:Vlucht2040%23@db:5432/gobooksnew?sslmode=disable"
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy

volumes:
  postgres_data: