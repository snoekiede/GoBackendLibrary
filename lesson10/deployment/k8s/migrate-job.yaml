apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: bookstore
spec:
  template:
    spec:
      containers:
        - name: migrate
          image: iedesnoek/bookstore-migrate:latest
          imagePullPolicy: IfNotPresent
          command: ["goose", "postgres", "postgres://postgres:password@postgres-service:5432/gobooksnew?sslmode=disable", "up"]
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done;']
  backoffLimit: 4