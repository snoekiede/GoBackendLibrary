apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-api
  namespace: bookstore
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bookstore-api
  template:
    metadata:
      labels:
        app: bookstore-api
    spec:
      containers:
        - name: api
          image: iedesnoek/bookstore-api:latest  # Update with your image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health  # Adjust to your health endpoint
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health  # Adjust to your health endpoint
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      initContainers:
        - name: wait-for-migration
          image: busybox:1.36
          command: ['sh', '-c', 'echo "Waiting for migration to complete"']