apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: bookstore
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: postgres:18-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h postgres-service -p 5432 -U postgres -d gobooksnew; do
            echo waiting for postgres
            sleep 2
          done
      containers:
      - name: migrate
        image: <your dockerhub username>/bookstore-migrate:latest
        imagePullPolicy: IfNotPresent
        command:
        - goose
        - postgres
        - postgres://postgres:password@postgres-service:5432/gobooksnew?sslmode=disable
        - up
  backoffLimit: 4